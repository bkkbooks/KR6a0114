body:
  text: 後漢沙門支曜譯聞如是一時佛在舍衛國祇樹給孤獨園佛便告諸比丘善馬有三相用入官可給御中王意得名為官馬何等為三相一者有善馬意自能走二者有力三者端正好色是為三相善馬中入官善人亦有三相自得善意名聞亦豪舉人敬難之可受人禮能福天下何等為三相有善人得意能走有力有端正色何等為善人得意能走有善人得意是苦如有知為是習為是盡敗為是道識如是善人得意為走何等為善人得意為力為有弊惡態當為斷盡力求之精進求者意棄惡未起弊惡態不復起未起善意當為起已起善意當為止不忘減稍稍增多行意俱善行盡力求制意棄惡如是善人得力何等為善人得意有色端正是間有善人得意避五樂避弊惡能到四棄得行如是善人得意有色是為三因緣諦行善人得意名聞為能主舉人難之可取禮天下如是佛說如是
